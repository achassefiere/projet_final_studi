<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}M-Motors{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(135deg, #abd0f5, #2b2d3d);
            background-attachment: fixed; /* 🔥 important pour éviter les “coupures” */
            min-height: 100vh;
            font-family: "Poppins", sans-serif;

            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            padding: 2rem 1rem;
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>

<body>

    {% include 'part/navbar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'part/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
