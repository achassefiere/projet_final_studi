<head>
    <meta charset="UTF-8">
    <title>Accueil - M-Motors</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        /* RESET */
        html, body {
            height: 100%;
            margin: 0;
        }

        /* GRADIENT GLOBAL */
        html {
            background: linear-gradient(135deg, #abd0f5, #2b2d3d);
        }

        body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;

            display: flex;
            flex-direction: column;

            background: transparent;
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* FOOTER */
        footer.footer {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.08); /* option glass */
            backdrop-filter: blur(8px);
            color: white;
        }

    </style>
</head>
